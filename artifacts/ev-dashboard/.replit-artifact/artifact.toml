kind = "web"
previewPath = "/"
title = "EV Car Dashboard"
version = "1.0.0"
id = "artifacts/ev-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25455

[services.development]
run = "pnpm --filter @workspace/ev-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ev-dashboard", "run", "build" ]
publicDir = "artifacts/ev-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25455"
BASE_PATH = "/"
